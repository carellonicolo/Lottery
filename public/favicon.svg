<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Rich gold to vibrant orange/red -->
    <radialGradient id="sphereGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFE259" />
      <stop offset="40%" stop-color="#FFA751" />
      <stop offset="85%" stop-color="#FF4B2B" />
      <stop offset="100%" stop-color="#D31027" />
    </radialGradient>
    
    <!-- Outer Glow / Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#FF4B2B" flood-opacity="0.3" />
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.2" />
    </filter>

    <!-- Glossy Overlay -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Inner Circle Shadow -->
    <radialGradient id="innerShadow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#FFFFFF" />
      <stop offset="95%" stop-color="#E0E0E0" />
      <stop offset="100%" stop-color="#B0B0B0" />
    </radialGradient>
  </defs>

  <!-- Main Spherical Ball -->
  <circle cx="256" cy="256" r="210" fill="url(#sphereGrad)" filter="url(#glow)" />

  <!-- 3D Highlight Crescent -->
  <path d="M 76 180 A 210 210 0 0 1 436 180 A 200 206 0 0 0 76 180 Z" fill="url(#gloss)" />

  <!-- Central White Disc for the Number -->
  <circle cx="256" cy="256" r="100" fill="url(#innerShadow)" stroke="#FFFFFF" stroke-width="4" />

  <!-- Inner shadow overlay for the white disc to make it look recessed/3D -->
  <circle cx="256" cy="256" r="100" fill="black" fill-opacity="0.05" />

  <!-- Number 90 (Classic Lotto Number) -->
  <text x="256" y="292" 
        font-family="system-ui, -apple-system, 'Space Grotesk', sans-serif" 
        font-size="110" 
        font-weight="900" 
        fill="#1A1A1A" 
        text-anchor="middle" 
        letter-spacing="-4">90</text>

  <!-- Sparkle/Reflection details -->
  <ellipse cx="170" cy="120" rx="30" ry="15" transform="rotate(-30 170 120)" fill="#FFFFFF" opacity="0.7" />
  <circle cx="120" cy="160" r="8" fill="#FFFFFF" opacity="0.5" />
</svg>
